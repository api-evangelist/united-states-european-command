description: >-
  United States European Command (EUCOM) is one of the eleven unified combatant commands
  of the U.S. Department of Defense. EUCOM is responsible for U.S. military operations
  and security cooperation in Europe, as well as parts of North Africa and the Middle
  East. The command works to support NATO allies, deter aggression, and ensure regional
  stability through a variety of military exercises, humanitarian operations, and
  partnership activities.
